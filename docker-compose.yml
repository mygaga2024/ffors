# ============================================================
# FFORS Docker Compose — 本地开发 & NAS 部署
# 适配绿联 DXP4800 Plus (Intel x86_64, UGOS Pro)
# ============================================================

services:
  # --- PostgreSQL 数据库 ---
  ffors-db:
    image: postgres:16-alpine
    container_name: ffors-db
    restart: unless-stopped
    env_file:
      - env
    environment:
      POSTGRES_DB: ffors
      POSTGRES_USER: ffors_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ffors_dev_2024}
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - ffors_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffors_user -d ffors"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FFORS API 服务 ---
  ffors-api:
    image: ghcr.io/mygaga2024/ffors:latest
    container_name: ffors-api
    restart: unless-stopped
    depends_on:
      ffors-db:
        condition: service_healthy
    env_file:
      - env
    environment:
      DATABASE_URL: postgresql+asyncpg://ffors_user:${DB_PASSWORD:-ffors_dev_2024}@ffors-db:5432/ffors
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 1G
    ports:
      - "11800:8000"
    volumes:
      - ./data:/app/data
      - ffors_logs:/app/logs

volumes:
  ffors_pgdata:
    driver: local
  ffors_logs:
    driver: local
